{% extends 'base.html' %}

{% block title %}Edit Barang{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='barang.css') }}">
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Edit Barang</h1>
    <p>Ubah data barang yang dipilih.</p>
</div>

<div class="admin-card">

    <form method="POST">

        <div class="form-group">
            <label>Nama Barang</label>
            <input
                type="text"
                name="nama"
                value="{{ barang['nama'] }}"
                required
            >
        </div>

        <br>

        <div class="form-group">
            <label>Stok</label>
            <input
                type="number"
                name="stok"
                value="{{ barang['stok'] }}"
                min="0"
                required
            >
        </div>

        <br>

        <button type="submit" class="btn-tambah">
            Simpan Perubahan
        </button>

        <a href="/barang" class="btn-hapus">
            Batal
        </a>

    </form>

</div>

{% endblock %}

{% extends 'base.html' %}

{% block title %}Laporan{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Laporan Peminjaman</h1>
    <p>Grafik statistik peminjaman barang</p>
</div>

<div class="chart-card">

    <canvas id="myChart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: [
            'Menunggu',
            'Disetujui',
            'Ditolak',
            'Dikembalikan'
        ],
        datasets: [{
            label: 'Jumlah Peminjaman',
            data: [
                {{ menunggu }},
                {{ disetujui }},
                {{ ditolak }},
                {{ dikembalikan }}
            ],
            backgroundColor: [
                '#f59e0b',
                '#22c55e',
                '#ef4444',
                '#3b82f6'
            ]
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: false
            }
        }
    }
});
</script>

{% endblock %}
